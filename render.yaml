services:
  # Backend auth proxy — handles OAuth token exchange and proxies all
  # Salesforce API calls server-to-server (eliminates CORS)
  - type: web
    name: switchops-auth-proxy
    runtime: node
    buildCommand: cd server && npm ci
    startCommand: cd server && npm start
    envVars:
      - key: FRONTEND_ORIGIN
        sync: false   # e.g. https://switchops.onrender.com
      - key: SF_OAUTH_CLIENT_SECRET
        sync: false   # Connected App client secret (server-side only)
      - key: SF_OAUTH_ALLOWED_HOSTS
        value: login.salesforce.com,test.salesforce.com
      - key: SF_API_ALLOWED_HOST_SUFFIXES
        value: salesforce.com,force.com,salesforce.mil

  # Frontend static SPA
  - type: static
    name: switchops
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_SF_CLIENT_ID
        sync: false   # Connected App Consumer Key
      - key: VITE_SF_REDIRECT_URI
        sync: false   # e.g. https://switchops.onrender.com/callback
      - key: VITE_SF_AUTH_PROXY_URL
        sync: false   # e.g. https://switchops-auth-proxy.onrender.com
